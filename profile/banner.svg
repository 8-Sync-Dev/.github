<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="none">
    <defs>
        <linearGradient id="bgLine" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0a0500" />
            <stop offset="50%" stop-color="#1c0a00" />
            <stop offset="100%" stop-color="#050200" />
        </linearGradient>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FF7A00" stop-opacity="0.25" />
            <stop offset="100%" stop-color="#0a0500" stop-opacity="0" />
        </radialGradient>
        
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FF7A00" stroke-opacity="0.07" stroke-width="1"/>
            <circle cx="0" cy="0" r="1.5" fill="#FF7A00" fill-opacity="0.3" />
        </pattern>

        <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <style>
            @keyframes pulse {
                0% { opacity: 0.7; transform: scale(1); }
                50% { opacity: 1; transform: scale(1.03); }
                100% { opacity: 0.7; transform: scale(1); }
            }
            @keyframes slideLeft {
                0% { stroke-dashoffset: 1000; }
                100% { stroke-dashoffset: 0; }
            }
            @keyframes slideRight {
                0% { stroke-dashoffset: -1000; }
                100% { stroke-dashoffset: 0; }
            }
            @keyframes float {
                0% { transform: translateY(0px) rotate(0deg); }
                50% { transform: translateY(-15px) rotate(3deg); }
                100% { transform: translateY(0px) rotate(0deg); }
            }
            .pulse-circle {
                animation: pulse 4s infinite ease-in-out;
                transform-origin: center;
            }
            .data-line-1 {
                stroke-dasharray: 60 40;
                animation: slideLeft 12s linear infinite;
            }
            .data-line-2 {
                stroke-dasharray: 40 80;
                animation: slideRight 15s linear infinite;
            }
            .float-element {
                animation: float 7s infinite ease-in-out;
                transform-origin: center;
            }
            .text-glow {
                font-family: 'Courier New', monospace;
                font-weight: bold;
                fill: #FF7A00;
                filter: url(#neonGlow);
            }
        </style>
    </defs>

    <!-- Background -->
    <rect width="1200" height="400" fill="url(#bgLine)" />
    <rect width="1200" height="400" fill="url(#glow)" />
    <rect width="1200" height="400" fill="url(#grid)" />

    <!-- 3D Abstract AI Nodes System -->
    <!-- Network Lines forming Polyhedrons -->
    <g transform="translate(600, 200)" opacity="0.4">
        <path d="M -400 -50 L -250 -130 L -100 -60 L -150 70 L -300 120 Z" fill="none" stroke="#FF7A00" stroke-width="1.5" />
        <path d="M -250 -130 L -150 70 M -400 -50 L -100 -60 M -300 120 L -100 -60" fill="none" stroke="#FF7A00" stroke-width="0.5" />
        
        <path d="M 400 50 L 250 130 L 100 60 L 150 -70 L 300 -120 Z" fill="none" stroke="#FF7A00" stroke-width="1.5" />
        <path d="M 250 130 L 150 -70 M 400 50 L 100 60 M 300 -120 L 100 60" fill="none" stroke="#FF7A00" stroke-width="0.5" />
    </g>

    <!-- Center Core -->
    <g transform="translate(600, 200)">
        <!-- Outer rotating rings -->
        <circle cx="0" cy="0" r="130" fill="none" stroke="#FF7A00" stroke-width="2" stroke-opacity="0.15" class="pulse-circle" />
        <circle cx="0" cy="0" r="160" fill="none" stroke="#FF7A00" stroke-dasharray="10 20" stroke-width="1.5" stroke-opacity="0.3" class="pulse-circle" style="animation-delay: -1.5s" />
        <circle cx="0" cy="0" r="210" fill="none" stroke="#FF7A00" stroke-dasharray="2 12" stroke-width="3" stroke-opacity="0.6" class="pulse-circle" style="animation-duration: 8s" />

        <!-- AI Neural Connections -->
        <path d="M -300 -120 L -80 -40 L 0 0 L 80 40 L 300 120 M 0 0 L -150 150 M 0 0 L 150 -150 M -100 200 L 0 0 L 100 -200" stroke="#FF7A00" stroke-width="2" stroke-opacity="0.4" class="data-line-1" />
        <path d="M -400 0 L 0 0 L 400 0 M 0 -180 L 0 180 M -200 -80 L 200 80 M 200 -80 L -200 80" stroke="#FF7A00" stroke-width="1" stroke-opacity="0.2" class="data-line-2" />
        
        <!-- Glowing Floating Nodes -->
        <g class="float-element" style="animation-delay: 0s"><circle cx="-300" cy="-120" r="8" fill="#FF7A00" filter="url(#neonGlow)" /></g>
        <g class="float-element" style="animation-delay: -1s"><circle cx="-80" cy="-40" r="5" fill="#FFF" filter="url(#neonGlow)" /></g>
        <g class="float-element" style="animation-delay: -2s"><circle cx="150" cy="-150" r="10" fill="#FF7A00" filter="url(#neonGlow)" /></g>
        <g class="float-element" style="animation-delay: -3s"><circle cx="300" cy="120" r="9" fill="#FF7A00" filter="url(#neonGlow)" /></g>
        <g class="float-element" style="animation-delay: -4s"><circle cx="80" cy="40" r="6" fill="#FFF" filter="url(#neonGlow)" /></g>
        <g class="float-element" style="animation-delay: -5s"><circle cx="-150" cy="150" r="7" fill="#FF7A00" filter="url(#neonGlow)" /></g>
        <g class="float-element" style="animation-delay: -6s"><circle cx="-100" cy="200" r="6" fill="#FF7A00" filter="url(#neonGlow)" /></g>
        <g class="float-element" style="animation-delay: -2.5s"><circle cx="100" cy="-200" r="8" fill="#FF7A00" filter="url(#neonGlow)" /></g>

        <!-- Complex 3D Hexagon Core -->
        <g class="pulse-circle">
            <polygon points="0,-75 65,-37.5 65,37.5 0,75 -65,37.5 -65,-37.5" fill="#FF7A00" fill-opacity="0.05" stroke="#FF7A00" stroke-width="3" filter="url(#neonGlow)" />
            <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="#FF7A00" stroke-width="1.5" />
            <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="none" stroke="#FFF" stroke-width="2" stroke-opacity="0.8" />
            
            <!-- Isometric Core Grid -->
            <path d="M 0 -75 L 0 75 M -65 -37.5 L 65 37.5 M -65 37.5 L 65 -37.5" stroke="#FF7A00" stroke-width="1" stroke-opacity="0.5"/>
            <circle cx="0" cy="0" r="20" fill="#FF7A00" filter="url(#neonGlow)" />
            <circle cx="0" cy="0" r="8" fill="#FFF" filter="url(#neonGlow)" />
        </g>
    </g>

    <!-- Overlay Text & Decorations -->
    <text x="60" y="80" class="text-glow" font-size="28" letter-spacing="6">> 8_SYNC_DEV.INIT(AI)</text>
    <text x="60" y="110" font-family="'Courier New', monospace" font-size="14" fill="#FF7A00" fill-opacity="0.6">LOADING WEB3 PROTOCOLS...</text>
    <text x="60" y="130" font-family="'Courier New', monospace" font-size="14" fill="#FF7A00" fill-opacity="0.6">ESTABLISHING 3D ENGINE PIPELINE...</text>
    
    <text x="60" y="340" class="text-glow" font-size="18" fill-opacity="0.8">SYSTEM_ONLINE // V3.0</text>
    <text x="1140" y="340" class="text-glow" font-size="18" fill-opacity="0.8" text-anchor="end">NEURAL_NET_SYNC: 100%</text>

    <!-- UI Elements -->
    <path d="M 1140 60 L 1100 60 L 1090 70" fill="none" stroke="#FF7A00" stroke-width="2" stroke-opacity="0.8" filter="url(#neonGlow)" />
    <circle cx="1140" cy="60" r="4" fill="#FF7A00" />
    
    <path d="M 60 360 L 100 360 L 110 350" fill="none" stroke="#FF7A00" stroke-width="2" stroke-opacity="0.8" filter="url(#neonGlow)" />
    <circle cx="60" cy="360" r="4" fill="#FF7A00" />
    
    <rect x="55" y="55" width="280" height="90" fill="none" stroke="#FF7A00" stroke-width="1" stroke-opacity="0.2" border-radius="4"/>
</svg>
